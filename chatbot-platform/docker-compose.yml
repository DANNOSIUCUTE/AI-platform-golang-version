version: '3.8'

services:
  app:
    build: .
    container_name: chatbot_golang
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=chatbot_platform
      # Truyền biến môi trường vào container nếu chạy local
      - CLAUDE_API_KEY=${CLAUDE_API_KEY} 
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: chatbot_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: chatbot_platform
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
